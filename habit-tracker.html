<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitLoop Pro | Advanced Habit Tracker</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <!-- Chart.js for Diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Confetti for Celebrations -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --bg-gradient: radial-gradient(circle at top left, #1e1b4b 0%, #0f172a 100%);
            --card-bg: rgba(30, 41, 59, 0.6);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --glass-blur: blur(16px);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Glass Floating Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding: 1.25rem 2.5rem;
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: 30px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            animation: slideDown 1s var(--transition);
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.75rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .logo ion-icon {
            color: var(--primary);
            -webkit-text-fill-color: initial;
            font-size: 2.25rem;
            filter: drop-shadow(0 0 8px var(--primary-light));
        }

        /* Advanced Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3.5rem;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            padding: 2rem;
            border-radius: 28px;
            border: 1px solid var(--card-border);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--primary-light);
            box-shadow: var(--shadow-glow);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
        }

        /* Radial Progress Circle */
        .progress-circle-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto;
        }

        .progress-circle {
            transform: rotate(-90deg);
        }

        .progress-circle circle {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
        }

        .circle-bg {
            stroke: rgba(255, 255, 255, 0.05);
        }

        .circle-progress {
            stroke: url(#gradient);
            stroke-dasharray: 377;
            stroke-dashoffset: 377;
            /* Fully hidden */
            transition: stroke-dashoffset 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
        }

        /* Activity Diagram */
        .chart-container {
            height: 180px;
            width: 100%;
        }

        /* Habit List Styling */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .list-header h2 {
            font-size: 1.75rem;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-plus {
            background: var(--primary);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-plus:hover {
            transform: rotate(90deg) scale(1.1);
            background: var(--primary-dark);
        }

        /* Habit Cards Enhanced */
        .habit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .habit-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: 26px;
            padding: 1.5rem;
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            transition: var(--transition);
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .habit-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(45, 55, 72, 0.7);
        }

        .habit-top {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .habit-icon-pro {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(236, 72, 153, 0.15));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-light);
            font-size: 1.75rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .habit-details h3 {
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
            color: #fff;
        }

        .habit-stats-mini {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .mini-stat {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .mini-stat.highlight {
            color: var(--secondary);
        }

        .habit-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .completion-track {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }

        .dot.active {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .check-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            padding: 0.6rem 1.25rem;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .check-pill:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .check-pill.completed {
            background: var(--success);
            border-color: var(--success);
            color: #fff;
        }

        .delete-btn-pro {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            opacity: 0;
            transition: var(--transition);
        }

        .habit-card:hover .delete-btn-pro {
            opacity: 1;
        }

        .delete-btn-pro:hover {
            color: var(--danger);
        }

        /* Premium Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 1.5rem;
        }

        .modal {
            background: #1e293b;
            width: 100%;
            max-width: 500px;
            border-radius: 35px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal h2 {
            font-size: 1.75rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .icon-option {
            width: 100%;
            aspect-ratio: 1;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
        }

        .icon-option:hover {
            color: var(--primary-light);
            background: rgba(99, 102, 241, 0.1);
        }

        .icon-option.selected {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(99, 102, 241, 0.15);
        }

        input {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--card-border);
            border-radius: 15px;
            padding: 1rem 1.25rem;
            color: white;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            outline: none;
            transition: var(--transition);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        .modal-btns {
            display: flex;
            gap: 1rem;
        }

        .btn-modal {
            flex: 1;
            padding: 1rem;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }

        .btn-primary-modal {
            background: var(--primary);
            color: #fff;
        }

        .btn-secondary-modal {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--card-border);
        }

        .btn-primary-modal:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 5rem 2rem;
            opacity: 0.6;
        }

        .empty-state ion-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            color: var(--primary-light);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--card-border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            header {
                padding: 1rem 1.5rem;
                margin-bottom: 2rem;
            }

            .logo {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">
                <ion-icon name="flash-sharp"></ion-icon>
                <span>HabitLoop Pro</span>
            </div>
            <div id="current-date" style="color: var(--text-muted); font-weight: 600; font-size: 0.9rem;"></div>
        </header>

        <section class="dashboard-grid">
            <!-- Radial Progress Card -->
            <div class="stat-card">
                <span class="stat-label">Daily Master Score</span>
                <div class="progress-circle-container">
                    <svg class="progress-circle" width="140" height="140">
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="var(--primary)" />
                                <stop offset="100%" stop-color="var(--secondary)" />
                            </linearGradient>
                        </defs>
                        <circle class="circle-bg" cx="70" cy="70" r="60" />
                        <circle id="progress-bar" class="circle-progress" cx="70" cy="70" r="60" />
                    </svg>
                    <div id="score-text" class="progress-text">0%</div>
                </div>
            </div>

            <!-- Activity Diagram Card -->
            <div class="stat-card">
                <span class="stat-label">Activity Diagram (Last 7 Days)</span>
                <div class="chart-container">
                    <canvas id="activityChart"></canvas>
                </div>
            </div>

            <!-- Quick Stats Card -->
            <div class="stat-card">
                <span class="stat-label">Performance Overview</span>
                <div
                    style="display: flex; justify-content: space-around; text-align: center; height: 100%; align-items: center;">
                    <div>
                        <div id="stat-active" class="stat-value"
                            style="font-size: 2.5rem; font-weight: 800; color: var(--accent);">0</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Active
                        </div>
                    </div>
                    <div style="width: 1px; height: 40px; background: var(--card-border);"></div>
                    <div>
                        <div id="stat-streak" class="stat-value"
                            style="font-size: 2.5rem; font-weight: 800; color: var(--secondary);">0</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Best
                            Streak</div>
                    </div>
                </div>
            </div>
        </section>

        <div class="list-header">
            <h2>Current Journey</h2>
            <button class="btn-plus" onclick="openModal()">
                <ion-icon name="add-outline"></ion-icon>
            </button>
        </div>

        <div id="habit-grid" class="habit-grid">
            <!-- Loaded by JS -->
        </div>

        <div id="empty-state" class="empty-state" style="display: none;">
            <ion-icon name="sparkles-outline"></ion-icon>
            <h3>Your journey begins with a single step.</h3>
            <p style="color: var(--text-muted); margin-top: 1rem;">Click the + button to add your first habit.</p>
        </div>
    </div>

    <!-- Enhanced Add Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2>Track New Habit</h2>
            <input type="text" id="habit-name" placeholder="What's your new goal?">

            <label style="display: block; margin-bottom: 1rem; color: var(--text-muted);">Pick an Icon</label>
            <div class="icon-grid" id="icon-grid">
                <!-- Icons generated here -->
            </div>

            <div class="modal-btns">
                <button class="btn-modal btn-secondary-modal" onclick="closeModal()">Dismiss</button>
                <button class="btn-modal btn-primary-modal" onclick="addHabit()">Initialize</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let habits = JSON.parse(localStorage.getItem('habits')) || [];
        const today = new Date().toISOString().split('T')[0];
        let selectedIcon = 'fitness-outline';
        let chartInstance = null;

        const availableIcons = [
            'fitness-outline', 'book-outline', 'water-outline', 'code-working-outline',
            'leaf-outline', 'moon-outline', 'nutrition-outline', 'brush-outline',
            'wallet-outline', 'language-outline', 'barbell-outline', 'bicycle-outline',
            'flower-outline', 'game-controller-outline', 'heart-outline'
        ];

        // UI Components initialization
        function init() {
            renderHeader();
            renderIconGrid();
            renderHabits();
            updateDashboard();
            initChart();
        }

        function renderHeader() {
            const options = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', options);
        }

        function renderIconGrid() {
            const grid = document.getElementById('icon-grid');
            grid.innerHTML = '';
            availableIcons.forEach(icon => {
                const opt = document.createElement('div');
                opt.className = `icon-option ${icon === selectedIcon ? 'selected' : ''}`;
                opt.innerHTML = `<ion-icon name="${icon}"></ion-icon>`;
                opt.onclick = () => {
                    document.querySelectorAll('.icon-option').forEach(el => el.classList.remove('selected'));
                    opt.classList.add('selected');
                    selectedIcon = icon;
                };
                grid.appendChild(opt);
            });
        }

        // Logic
        function addHabit() {
            const name = document.getElementById('habit-name').value.trim();
            if (!name) return;

            const newHabit = {
                id: Date.now(),
                name: name,
                icon: selectedIcon,
                streak: 0,
                history: [], // dates completed
                createdAt: today
            };

            habits.push(newHabit);
            save();
            renderHabits();
            updateDashboard();
            closeModal();
            document.getElementById('habit-name').value = '';
        }

        function toggleComplete(id) {
            const habit = habits.find(h => h.id === id);
            const idx = habit.history.indexOf(today);

            if (idx > -1) {
                habit.history.splice(idx, 1);
                habit.streak = Math.max(0, habit.streak - 1);
            } else {
                habit.history.push(today);
                habit.streak += 1;
                triggerConfetti();
            }

            save();
            renderHabits();
            updateDashboard();
        }

        function triggerConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#6366f1', '#ec4899', '#06b6d4', '#10b981']
            });
        }

        function removeHabit(id) {
            if (confirm('Delete this habit journey?')) {
                habits = habits.filter(h => h.id !== id);
                save();
                renderHabits();
                updateDashboard();
            }
        }

        function save() {
            localStorage.setItem('habits', JSON.stringify(habits));
        }

        // Dashboard Visuals
        function updateDashboard() {
            // Radial Progress
            const completedToday = habits.filter(h => h.history.includes(today)).length;
            const total = habits.length;
            const percent = total === 0 ? 0 : Math.round((completedToday / total) * 100);

            const circle = document.getElementById('progress-bar');
            const circumference = 2 * Math.PI * 60;
            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;
            document.getElementById('score-text').innerText = `${percent}%`;

            // Simple Stats
            document.getElementById('stat-active').innerText = total;
            const bestStreak = total === 0 ? 0 : Math.max(...habits.map(h => h.streak));
            document.getElementById('stat-streak').innerText = bestStreak;

            // Empty State
            document.getElementById('empty-state').style.display = total === 0 ? 'block' : 'none';

            // Refresh Chart
            updateChart();
        }

        function initChart() {
            const ctx = document.getElementById('activityChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: getDatesLabels(),
                    datasets: [{
                        label: 'Tasks Completed',
                        data: getActivityData(),
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.2)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false, beginAtZero: true },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8', font: { size: 10 } }
                        }
                    }
                }
            });
        }

        function updateChart() {
            if (chartInstance) {
                chartInstance.data.datasets[0].data = getActivityData();
                chartInstance.update();
            }
        }

        function getActivityData() {
            const data = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().split('T')[0];
                const count = habits.filter(h => h.history.includes(dateStr)).length;
                data.push(count);
            }
            return data;
        }

        function getDatesLabels() {
            const labels = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                labels.push(d.toLocaleDateString('en-US', { weekday: 'short' }));
            }
            return labels;
        }

        // UI Rendering
        function renderHabits() {
            const grid = document.getElementById('habit-grid');
            grid.innerHTML = '';

            habits.forEach(habit => {
                const isCompleted = habit.history.includes(today);
                const card = document.createElement('div');
                card.className = 'habit-card';
                card.innerHTML = `
                    <button class="delete-btn-pro" onclick="removeHabit(${habit.id})">
                        <ion-icon name="close-circle-outline"></ion-icon>
                    </button>
                    <div class="habit-top">
                        <div class="habit-icon-pro">
                            <ion-icon name="${habit.icon}"></ion-icon>
                        </div>
                        <div class="habit-details">
                            <h3>${habit.name}</h3>
                            <div class="habit-stats-mini">
                                <div class="mini-stat highlight">
                                    <ion-icon name="flame"></ion-icon> ${habit.streak} Streaks
                                </div>
                                <div class="mini-stat">
                                    <ion-icon name="shield-checkmark"></ion-icon> ${habit.history.length} Done
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="habit-bottom">
                        <div class="completion-track">
                             ${[...Array(7)].map((_, i) => `<div class="dot ${i < (habit.streak % 7 || (habit.streak > 0 ? 7 : 0)) ? 'active' : ''}"></div>`).join('')}
                        </div>
                        <button class="check-pill ${isCompleted ? 'completed' : ''}" onclick="toggleComplete(${habit.id})">
                            <ion-icon name="${isCompleted ? 'checkmark-circle' : 'ellipse-outline'}"></ion-icon>
                            ${isCompleted ? 'Completed' : 'Mark Done'}
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Modal Controls
        function openModal() {
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        window.onclick = e => {
            if (e.target === document.getElementById('modal-overlay')) closeModal();
        };

        // Init
        init();
    </script>
</body>

</html>
