<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitLoop Elite | The Ultimate Productivity System</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --bg-gradient: radial-gradient(circle at top left, #1e1b4b 0%, #0f172a 100%);
            --card-bg: rgba(30, 41, 59, 0.6);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --glass-blur: blur(20px);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --shadow-glow: 0 0 25px rgba(99, 102, 241, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        .rank-label {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* XP Progress Bar At Top */
        .xp-system {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: var(--glass-blur);
            padding: 0.75rem 2rem;
            border-bottom: 2px solid var(--card-border);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1500;
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .xp-bar-container {
            flex-grow: 1;
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 10px var(--primary-light);
        }

        .level-tag {
            background: var(--primary);
            color: white;
            padding: 0.25rem 1rem;
            border-radius: 100px;
            font-weight: 800;
            font-family: 'Outfit';
            font-size: 0.9rem;
            white-space: nowrap;
        }

        /* Header Restyling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 4rem 0 3rem;
            /* Space for XP bar */
            padding: 1.5rem 2.5rem;
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: 35px;
            border: 1px solid var(--card-border);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4);
            animation: slideDown 1s var(--transition);
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            font-size: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .logo ion-icon {
            color: var(--primary);
            -webkit-text-fill-color: initial;
            font-size: 2.5rem;
            filter: drop-shadow(0 0 12px var(--primary-light));
        }

        /* Inspirational Quote */
        .quote-box {
            text-align: center;
            margin-bottom: 3.5rem;
            color: var(--text-muted);
            font-style: italic;
            font-size: 1.25rem;
            opacity: 0.8;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 1rem;
        }

        /* Main Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            padding: 2.5rem;
            border-radius: 35px;
            border: 1px solid var(--card-border);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-light);
            box-shadow: var(--shadow-glow);
        }

        /* Radial Circle Pro */
        .progress-circle-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto;
        }

        .progress-circle circle {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
        }

        .circle-bg {
            stroke: rgba(255, 255, 255, 0.03);
        }

        .circle-progress {
            stroke: url(#gradient);
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: 900;
        }

        /* Pomodoro Timer Dock */
        .timer-dock {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            padding: 2.5rem;
            border-radius: 35px;
            border: 1px solid var(--card-border);
            text-align: center;
        }

        .timer-display {
            font-size: 4rem;
            font-weight: 900;
            font-family: 'Outfit';
            margin: 1.5rem 0;
            background: linear-gradient(135deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .timer-btns {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .btn-timer {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-timer:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .btn-timer.active {
            background: var(--secondary);
            border-color: var(--secondary);
        }

        /* List Header */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .btn-add-infinite {
            background: var(--primary);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 12px 24px rgba(99, 102, 241, 0.4);
        }

        .btn-add-infinite:hover {
            transform: rotate(180deg) scale(1.1);
            background: var(--secondary);
        }

        /* Habit Cards Elite */
        .habit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 2rem;
        }

        .habit-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: var(--transition);
            animation: slideIn 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .habit-icon-box {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.25rem;
            color: var(--primary-light);
            box-shadow: inset 0 0 12px rgba(255, 255, 255, 0.05);
        }

        .habit-title-row {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .check-action {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 0.8rem 1.5rem;
            border-radius: 100px;
            color: var(--success);
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .check-action.done {
            background: var(--success);
            color: white;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        /* Modal Elite */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(25px);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal {
            background: #111827;
            width: 100%;
            max-width: 600px;
            border-radius: 40px;
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .floating-rank {
            position: absolute;
            top: -15px;
            right: 20px;
            background: var(--secondary);
            color: white;
            padding: 0.25rem 1rem;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(236, 72, 153, 0.4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .xp-system span {
                display: none;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- XP Tracking Bar -->
    <div class="xp-system">
        <div class="level-tag">LVL <span id="user-level">1</span></div>
        <div class="xp-bar-container">
            <div id="xp-fill" class="xp-fill"></div>
        </div>
        <div class="rank-label" style="font-size: 0.8rem; color: var(--accent); white-space: nowrap;">
            RANK: <span id="user-rank">Novice</span>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <ion-icon name="planet-outline"></ion-icon>
                <span>HabitLoop Elite</span>
            </div>
            <div id="current-date"></div>
        </header>

        <div id="quote-display" class="quote-box">"The secret of getting ahead is getting started."</div>

        <section class="dashboard-grid">
            <!-- Master Score -->
            <div class="stat-card">
                <div class="stat-label">Daily Mastery</div>
                <div class="progress-circle-container">
                    <svg class="progress-circle" width="160" height="160">
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#4f46e5" />
                                <stop offset="100%" stop-color="#06b6d4" />
                            </linearGradient>
                        </defs>
                        <circle class="circle-bg" cx="80" cy="80" r="70" />
                        <circle id="mastery-circle" class="circle-progress" cx="80" cy="80" r="70" />
                    </svg>
                    <div id="mastery-text" class="progress-text">0%</div>
                </div>
            </div>

            <!-- Focus Timer -->
            <div class="timer-dock">
                <div class="stat-label">Focus Portal</div>
                <div id="timer-display" class="timer-display">25:00</div>
                <div class="timer-btns">
                    <button class="btn-timer active" id="btn-start" onclick="toggleTimer()">Ignition</button>
                    <button class="btn-timer" onclick="resetTimer()">Reset</button>
                </div>
            </div>

            <!-- Activity Line Chart -->
            <div class="stat-card">
                <div class="stat-label">Momentum Analysis</div>
                <div style="height: 180px;">
                    <canvas id="activityChart"></canvas>
                </div>
            </div>
        </section>

        <div class="list-header">
            <h2>Active Missions</h2>
            <button class="btn-add-infinite" onclick="openModal()">
                <ion-icon name="add-outline"></ion-icon>
            </button>
        </div>

        <div id="habit-grid" class="habit-grid">
            <!-- Mission Cards -->
        </div>
    </div>

    <!-- Elite Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 style="margin-bottom: 2rem; color: #fff;">Incept New Mission</h2>
            <input type="text" id="habit-name" placeholder="Name your quest...">

            <div class="icon-grid" id="icon-grid"
                style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 2rem;">
                <!-- Icons -->
            </div>

            <div style="display: flex; gap: 1rem;">
                <button class="btn-timer" style="flex: 1;" onclick="closeModal()">Abuse</button>
                <button class="btn-timer active" style="flex: 1;" onclick="addHabit()">Incept</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let habits = JSON.parse(localStorage.getItem('habits_v2')) || [];
        let userData = JSON.parse(localStorage.getItem('user_data')) || { xp: 0, level: 1 };
        const today = new Date().toISOString().split('T')[0];
        let timerSeconds = 25 * 60;
        let timerRunning = false;
        let timerInterval = null;
        let selectedIcon = 'sparkles-outline';

        const quotes = [
            "Your habits profile your future.",
            "Discipline is choosing between what you want now and what you want most.",
            "You will never change your life until you change something you do daily.",
            "Success is the sum of small efforts, repeated day-in and day-out.",
            "What you do every day matters more than what you do every once in a while."
        ];

        const icons = ['sparkles-outline', 'rocket-outline', 'fitness-outline', 'book-outline', 'code-working-outline', 'leaf-outline', 'diamond-outline', 'flame-outline'];

        // Sounds (Using Web Audio API Oscillator for 'ping')
        function playSound(freq = 440, type = 'sine', duration = 0.1) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + duration);
        }

        // Init
        function init() {
            renderDate();
            renderLevel();
            renderQuote();
            renderHabits();
            initChart();
            updateDashboard();
            initIcons();
        }

        function renderDate() {
            const opt = { day: 'numeric', month: 'short', year: 'numeric' };
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', opt);
        }

        function renderLevel() {
            const xpForNextLevel = userData.level * 100;
            const progress = (userData.xp % 100);
            document.getElementById('xp-fill').style.width = `${progress}%`;
            document.getElementById('user-level').innerText = userData.level;

            const ranks = ["Novice", "Adept", "Elite", "Legendary", "Immortal"];
            const rankIdx = Math.min(Math.floor(userData.level / 5), ranks.length - 1);
            document.getElementById('user-rank').innerText = ranks[rankIdx];
        }

        function renderQuote() {
            const q = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('quote-display').innerText = `"${q}"`;
        }

        function addXP(amount) {
            userData.xp += amount;
            const newLevel = Math.floor(userData.xp / 100) + 1;
            if (newLevel > userData.level) {
                userData.level = newLevel;
                triggerConfetti(true); // Big celebration
                playSound(880, 'square', 0.3); // Level up sound
            }
            saveUserData();
            renderLevel();
        }

        // Timer Logic
        function toggleTimer() {
            if (timerRunning) {
                clearInterval(timerInterval);
                document.getElementById('btn-start').innerText = 'Resume';
            } else {
                timerInterval = setInterval(() => {
                    timerSeconds--;
                    updateTimerDisplay();
                    if (timerSeconds <= 0) {
                        clearInterval(timerInterval);
                        timerRunning = false;
                        playSound(1000, 'sine', 0.5);
                        alert('Focus Session Complete!');
                        addXP(25);
                    }
                }, 1000);
                document.getElementById('btn-start').innerText = 'Halt';
            }
            timerRunning = !timerRunning;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerRunning = false;
            timerSeconds = 25 * 60;
            updateTimerDisplay();
            document.getElementById('btn-start').innerText = 'Ignition';
        }

        function updateTimerDisplay() {
            const m = Math.floor(timerSeconds / 60);
            const s = timerSeconds % 60;
            document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // Habit Logic
        function renderHabits() {
            const grid = document.getElementById('habit-grid');
            grid.innerHTML = '';
            habits.forEach(h => {
                const done = h.history.includes(today);
                const card = document.createElement('div');
                card.className = 'habit-card';
                card.innerHTML = `
                    <div class="floating-rank">ACTIVE</div>
                    <div class="habit-title-row">
                        <div class="habit-icon-box"><ion-icon name="${h.icon}"></ion-icon></div>
                        <div>
                            <h3 style="color:#fff;">${h.name}</h3>
                            <div style="font-size:0.8rem; color:var(--text-muted);">
                                Streak: <span style="color:var(--secondary);">${h.streak}</span> | Momentum: 98%
                            </div>
                        </div>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top: auto;">
                         <div style="display:flex; gap:4px;">
                            ${[...Array(5)].map(() => `<div style="width:12px; height:4px; background:rgba(255,255,255,0.1); border-radius:4px;"></div>`).join('')}
                         </div>
                         <button class="check-action ${done ? 'done' : ''}" onclick="toggleHabit(${h.id})">
                            <ion-icon name="${done ? 'checkmark-circle' : 'radio-button-off'}"></ion-icon>
                            ${done ? 'MISSION READY' : 'DEPLOY'}
                         </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleHabit(id) {
            const h = habits.find(x => x.id === id);
            const idx = h.history.indexOf(today);
            if (idx > -1) {
                h.history.splice(idx, 1);
                h.streak = Math.max(0, h.streak - 1);
            } else {
                h.history.push(today);
                h.streak++;
                triggerConfetti();
                addXP(15);
                playSound(660);
            }
            save();
            renderHabits();
            updateDashboard();
        }

        function triggerConfetti(big = false) {
            confetti({
                particleCount: big ? 300 : 100,
                spread: 90,
                origin: { y: 0.6 },
                colors: ['#6366f1', '#ec4899', '#06b6d4']
            });
        }

        function updateDashboard() {
            const completed = habits.filter(h => h.history.includes(today)).length;
            const total = habits.length;
            const percent = total === 0 ? 0 : Math.round((completed / total) * 100);

            const dash = 440 - (percent / 100) * 440;
            document.getElementById('mastery-circle').style.strokeDashoffset = dash;
            document.getElementById('mastery-text').innerText = `${percent}%`;

            if (chartInstance) {
                chartInstance.data.datasets[0].data = [12, 19, 3, 5, 2, 3, completed]; // Dummy + today
                chartInstance.update();
            }
        }

        // Chart
        let chartInstance = null;
        function initChart() {
            const ctx = document.getElementById('activityChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['S', 'M', 'T', 'W', 'T', 'F', 'S'],
                    datasets: [{
                        data: [5, 10, 8, 15, 12, 18, 0],
                        borderColor: '#6366f1',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#94a3b8' } } }
                }
            });
        }

        // Storage
        function save() { localStorage.setItem('habits_v2', JSON.stringify(habits)); }
        function saveUserData() { localStorage.setItem('user_data', JSON.stringify(userData)); }

        // Modal
        function openModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        function initIcons() {
            const container = document.getElementById('icon-grid');
            icons.forEach(i => {
                const d = document.createElement('div');
                d.className = 'icon-option';
                d.innerHTML = `<ion-icon name="${i}"></ion-icon>`;
                d.style.cssText = "padding:10px; background:rgba(255,255,255,0.05); border-radius:10px; cursor:pointer; color:var(--text-muted); text-align:center;";
                d.onclick = () => {
                    selectedIcon = i;
                    document.querySelectorAll('.icon-option').forEach(x => x.style.color = 'var(--text-muted)');
                    d.style.color = 'var(--primary)';
                };
                container.appendChild(d);
            });
        }

        function addHabit() {
            const name = document.getElementById('habit-name').value;
            if (!name) return;
            habits.push({ id: Date.now(), name, icon: selectedIcon, history: [], streak: 0 });
            save(); renderHabits(); updateDashboard(); closeModal();
        }

        init();
    </script>
</body>

</html>
